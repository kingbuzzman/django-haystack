name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ruff: # https://docs.astral.sh/ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: pip install --user ruff
      - run: ruff check --output-format=github

  test:
    runs-on: ubuntu-latest
    needs: ruff # Do not run the tests if linting fails.
    strategy:
      fail-fast: false
      matrix: # https://docs.djangoproject.com/en/stable/faq/install/#what-python-version-can-i-use-with-django
        django-version: ["4.2", "5.1", "5.2"]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        exclude:
          - django-version: "4.2"
            python-version: "3.13"
          - django-version: "5.1"
            python-version: "3.9"
          - django-version: "5.2"
            python-version: "3.9"
    services:
      elastic7:
        image: elasticsearch:7.17.28
        env:
          discovery.type: "single-node"
        options: >-
          --health-cmd "curl http://localhost:9200/_cluster/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      elastic8:
        image: elasticsearch:8.19.2
        env:
          discovery.type: "single-node"
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: "-Xms512m -Xmx512m"
        options: >-
          --health-cmd "curl http://localhost:9200/_cluster/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      elastic9:
        image: elasticsearch:9.1.2
        env:
          discovery.type: "single-node"
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: "-Xms512m -Xmx512m"
        options: >-
          --health-cmd "curl http://localhost:9200/_cluster/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      solr:
        image: solr:6
        ports:
          - 9001:8983
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install --no-install-recommends -y gdal-bin
      - name: Setup solr test server in Docker
        run: bash test_haystack/solr_tests/server/setup-solr-test-server-in-docker.sh
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip tox tox-gh-actions
      - name: Format TOXENV
        id: format-tox
        run: |
          clean_dj_version=$(echo "${{ matrix.django-version }}" | tr -cd '[:alnum:]')
          clean_py_version=$(echo "${{ matrix.python-version }}" | tr -cd '[:alnum:]')
          name="py${clean_py_version}-dj${clean_dj_version}
          echo "out=${name}" >> $GITHUB_OUTPUT
      - name: Run test
        run: tox -v
        env:
          TOXENV: ${{ steps.format-tox.outputs.out }}
